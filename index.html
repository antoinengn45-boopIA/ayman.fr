<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="author" content="Antoine">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#D2331B">
  <meta name="msapplication-TileColor" content="#D2331B">
  <title>Antoine</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer">
  <script async src="https://tally.so/widgets/embed.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #111111;
      color: #ffffff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* === SHELL === */
    .shell {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      max-width: 64rem;
      margin-left: 1.5rem;
      margin-right: 1.5rem;
    }
    @media (min-width: 1024px) { .shell { margin-left: auto; margin-right: auto; } }

    /* === HEADER === */
    header {
      padding-top: 1.75rem;
      padding-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-left { display: none; align-items: center; }
    @media (min-width: 1024px) { .header-left { display: flex; } }

    .header-left .logo { font-weight: 800; font-size: 1.1rem; color: #fff; text-decoration: none; letter-spacing: -0.02em; }
    .header-left nav { margin-left: 2rem; }
    .header-left nav ul { display: flex; gap: 1.5rem; list-style: none; }
    .header-left nav a {
      color: #d1d5db;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9375rem;
      transition: color 0.2s;
    }
    .header-left nav a:hover { color: #fff; }

    .logo-mobile { display: block; font-weight: 800; font-size: 1.15rem; color: #fff; text-decoration: none; letter-spacing: -0.02em; }
    @media (min-width: 1024px) { .logo-mobile { display: none; } }

    .socials { display: none; }
    @media (min-width: 1024px) { .socials { display: flex; } }
    .socials a { color: #d1d5db; text-decoration: none; padding: 0 0.5rem; transition: color 0.2s; font-size: 1rem; }
    .socials a:hover { color: #fff; }

    .menu-btn {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: none;
      border: none;
      color: #d1d5db;
      cursor: pointer;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
    }
    .menu-btn svg { width: 1.5rem; height: 1.5rem; }
    @media (min-width: 1024px) { .menu-btn { display: none; } }

    .mobile-nav { display: none; flex-direction: column; gap: 1rem; padding: 1rem 0; border-top: 1px solid #222; }
    .mobile-nav.open { display: flex; }
    .mobile-nav a { color: #d1d5db; text-decoration: none; font-weight: 600; font-size: 0.9375rem; }
    .mobile-nav .soc-row { display: flex; gap: 1rem; padding-top: 0.5rem; }
    .mobile-nav .soc-row a { font-size: 1.1rem; }

    /* === MAIN === */
    main { flex: 1; display: flex; }
    .page-wrap { flex: 1; display: flex; }

    @keyframes fadein { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    .page-fade-in { animation: fadein 0.3s ease both; }

    .bento {
      display: grid;
      gap: 1rem;
      grid-auto-rows: 12rem;
      grid-template-columns: 1fr;
      margin: 0 auto;
      width: 100%;
    }
    @media (min-width: 480px)  { .bento { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 640px)  { .bento { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 1024px) { .bento { grid-template-columns: repeat(4, 1fr); grid-auto-rows: 11.4rem; } }

    .card {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-radius: 1.25rem;
      border: 1px solid #222222;
      overflow: hidden;
      transition: all 0.5s;
      position: relative;
    }
    .card:active { transform: scale(0.95); }

    .row-2  { grid-row: span 2; }
    .col-2  { grid-column: span 2; }

    /* === CARD STYLES === */
    .card-hero { background: #2A2A2A; justify-content: flex-end; padding: 1.5rem; gap: 0.15rem; }
    .card-hero .badge-top h2 { font-size: clamp(1.5rem, 3vw, 2.25rem); font-weight: 700; text-transform: uppercase; color: #fff; }
    .card-hero .role { font-size: 1.05rem; color: #fff; }
    .card-hero .tag  { font-size: 0.8rem; font-weight: 600; color: #D2331B; }
    
    .card-yt { background: #0E0E0E; }
    .card-yt:hover { transform: scale(1.03) rotate(2deg); transition-duration: 0.1s; }
    .card-yt-alt:hover { transform: scale(1.03) rotate(-2deg); transition-duration: 0.1s; }
    .yt-header { background: #2A2A2A; padding: 1rem; border-radius: 1.25rem 1.25rem 0 0; text-align: center; }
    .yt-body { flex: 1; display: flex; align-items: center; justify-content: center; padding: 0.5rem; }
    
    .card-red { background: #D2331B; }
    .social-inner { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; padding: 1rem 1rem 1.25rem; gap: 0.5rem; }
    .social-icon-big { font-size: 2.5rem; color: rgba(255,255,255,0.9); }
    .social-handle { font-size: 0.78rem; font-weight: 700; color: rgba(255,255,255,0.8); }
    
    .card-pattern { background: #2A2A2A; background-image: radial-gradient(circle, #3a3a3a 1px, transparent 1px); background-size: 14px 14px; }
    .card-pattern-inner { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .mono { font-size: 2rem; font-weight: 800; color: rgba(255,255,255,0.06); text-transform: uppercase; letter-spacing: 0.1em; text-align: center; }
    
    .card-team { background: #2A2A2A; }
    .team-header { background: linear-gradient(135deg, #2a1a1a, #1a1a2a, #1a2a1a); padding: 1rem; text-align: center; border-radius: 1.25rem 1.25rem 0 0; }
    .team-body { background: #2A2A2A; flex: 1; padding: 1rem; display: flex; flex-direction: column; justify-content: space-between; }
    .team-member { display: flex; align-items: center; margin-bottom: 0.75rem; gap: 0.75rem; }
    .avatar-placeholder { width: 3rem; height: 3rem; border-radius: 50%; background: #1a1a1a; border: 3px solid #D2331B; display: flex; align-items: center; justify-content: center; color: #D2331B; }
    .btn-join { display: inline-block; padding: 0.6rem 1.1rem; background: #D2331B; color: #fff; font-weight: 700; border-radius: 0.5rem; text-decoration: none; }

    .card-studio { background: #0E0E0E; background-image: radial-gradient(ellipse at 80% 50%, #1a0a0a 0%, #0E0E0E 60%); grid-column: span 2; position: relative; }
    .studio-inner { padding: 1.25rem; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; }
    
    .card-discord { background: linear-gradient(135deg, #1a1a2a, #2a1a2a, #1a2a2a); grid-column: span 2; }
    .card-discord-inner { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 1.5rem; gap: 0.75rem; text-align: center; }
    .btn-discord { display: inline-block; padding: 0.7rem 1.25rem; background: #222; color: #fff; border-radius: 0.5rem; text-decoration: none; border: 2px solid rgba(255,255,255,0.2); }

    .card-contact { background: #2A2A2A; }
    .card-contact-inner { display: flex; flex-direction: column; justify-content: space-between; height: 100%; padding: 1.5rem; }
    .btn-tally { background: #D2331B; color: #fff; border: none; border-radius: 2rem; padding: 0.6rem 1.15rem; font-weight: 700; cursor: pointer; }

    footer { color: #9ca3af; margin-top: 1rem; margin-bottom: 1rem; font-style: italic; display: flex; flex-direction: column; align-items: center; text-align: center; font-size: 0.875rem; padding: 0 1rem; }
  </style>
</head>
<body>
<div class="shell">
  <header>
    <div class="header-left">
      <a class="logo" href="/">Antoine</a>
      <nav>
        <ul>
          <li><a href="#contact">Me contacter</a></li>
          <li><a href="https://github.com/antoinengn45-boopIA" target="_blank" rel="noopener">Projets</a></li>
        </ul>
      </nav>
    </div>
    <a class="logo-mobile" href="/">Antoine</a>
    <div class="socials">
      <a href="https://www.youtube.com/@ayman-2.0tv" title="YouTube"><i class="fab fa-youtube"></i></a>
      <a href="https://github.com/antoinengn45-boopIA" title="GitHub"><i class="fab fa-github"></i></a>
    </div>
    <button class="menu-btn" id="menuBtn" aria-label="Menu">
      <span>Menu</span>
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
  </header>

  <nav class="mobile-nav" id="mobileNav">
    <a href="#contact">Me contacter</a>
    <a href="https://github.com/antoinengn45-boopIA" target="_blank">Projets GitHub</a>
  </nav>

  <main>
    <div class="page-wrap page-fade-in">
      <div class="bento">
        <!-- Contenu des cartes ici... -->
      </div>
    </div>
  </main>

  <footer>
    <div>Codé avec 🫶 par Antoine. Tous droits réservés.</div>
  </footer>
</div>

<script>
  document.getElementById('menuBtn').addEventListener('click', function() {
    document.getElementById('mobileNav').classList.toggle('open');
  });
</script>
</body>
</html>
