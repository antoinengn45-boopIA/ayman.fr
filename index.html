<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayman.fr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script async src="https://tally.so/widgets/embed.js"></script>
    <style>body { background-color: #000; color: white; }</style>
</head>
<body class="min-h-screen font-sans">

    <div class="max-w-5xl mx-auto px-6 py-10">
        <header class="flex justify-between items-center mb-16">
            <div class="text-xl font-bold tracking-tighter">AYMAN.FR</div>
            <nav class="hidden md:flex gap-8 text-sm font-medium text-gray-400">
                <a href="#projets" class="hover:text-white transition">Projets</a>
                <a href="#programmes" class="hover:text-white transition">Programmes</a>
                <a href="#" data-tally-open="b5vlD7" class="hover:text-white transition">Contact</a>
            </nav>
        </header>

        <main>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 auto-rows-[12rem]">
                
                <div class="bg-[#1F1F1F] rounded-[1.25rem] p-6 row-span-2 border border-gray-800">
                    <h2 class="text-2xl font-bold">Ayman</h2>
                    <p class="text-gray-400 mt-2">Développeur & Créateur</p>
                </div>

                <a href="https://ayman-site.netlify.app/" class="bg-[#1F1F1F] rounded-[1.25rem] p-6 border border-gray-800 hover:border-blue-500 transition">
                    <i class="fas fa-rocket text-xl mb-2"></i>
                    <h3 class="font-semibold">Mon Site Internet 1</h3>
                    <p class="text-gray-500 text-sm">Description courte du projet</p>
                </a>

                <a href="antoinengn45-boopia.github.io/dinocarter" class="bg-[#1F1F1F] rounded-[1.25rem] p-6 border border-gray-800 hover:border-blue-500 transition">
                    <i class="fas fa-gamepad text-xl mb-2"></i>
                    <h3 class="font-semibold">jeu du dinosaure revisité</h3>
                    <p class="text-gray-500 text-sm">Description courte du projet</p>
                </a>

                <div class="bg-[#1F1F1F] rounded-[1.25rem] p-6 border border-gray-800 sm:col-span-2">
                    <h3 class="font-semibold mb-2">Mes Programmes</h3>
                    <ul class="text-gray-400 text-sm space-y-1">
                        <li>• <a href="#" class="hover:text-white">Programme de formation A</a></li>
                        <li>• <a href="#" class="hover:text-white">Outil de développement B</a></li>
                    </ul>
                </div>

                <button data-tally-open="b5vlD7" data-tally-emoji-text="👋" data-tally-emoji-animation="wave"
                        class="bg-white text-black rounded-[1.25rem] p-6 text-left flex flex-col justify-between font-bold hover:bg-gray-200 transition sm:col-span-2">
                    <span>Envoyez-moi un message</span>
                    <span class="text-3xl"><i class="fas fa-arrow-right"></i></span>
                </button>

                <div class="bg-[#1F1F1F] rounded-[1.25rem] p-6 border border-gray-800 flex items-center justify-around text-2xl">
                    <a href="https://www.youtube.com/@ayman-2.0tv" class="hover:text-red-500"><i class="fab fa-youtube"></i></a>
                    <a href="https://github.com/antoinengn45-boopIA" class="hover:text-gray-400"><i class="fab fa-github"></i></a>
                </div>
            </div>
        </main>

        <footer class="mt-20 border-t border-gray-800 pt-8 text-gray-500 text-sm text-center">
            <p>© 2026 Ayman.fr - <a href="#" class="underline">Mentions légales</a></p>
        </footer>
    </div>
</body>
</html>
