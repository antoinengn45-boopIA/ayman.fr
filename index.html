<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antoine | Ayman.fr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script async src="https://tally.so/widgets/embed.js"></script>
    <style>
        body { background-color: #000; color: white; }
        canvas { image-rendering: pixelated; width: 100%; border-bottom: 2px solid #535353; cursor: pointer; }
    </style>
</head>
<body class="min-h-screen font-sans">

    <div class="max-w-5xl mx-auto px-6 py-10">
        <header class="flex justify-between items-center mb-10">
            <div class="text-xl font-bold tracking-tighter">AYMAN.FR</div>
            <nav class="hidden md:flex gap-8 text-sm font-medium text-gray-400">
                <a href="#projets" class="hover:text-white transition">Projets</a>
                <a href="#" data-tally-open="b5vlD7" class="hover:text-white transition">Contact</a>
            </nav>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-4 gap-4">
            
            <section class="lg:col-span-3 bg-[#1F1F1F] rounded-[1.25rem] p-8 border border-gray-800">
                <h1 class="text-4xl font-bold mb-2">[Votre Nom / Pseudo]</h1>
                <p class="text-gray-400 mb-6">[Une courte phrase sur ce que vous faites : ex: Développeur passionné par la tech et le gaming.]</p>
                
                <h2 id="projets" class="text-lg font-bold mb-4 mt-8">Mon Espace de Jeu</h2>
                <div id="game-wrapper" class="relative">
                    <canvas id="c" width="600" height="150"></canvas>
                    <div id="message" class="text-center mt-4 text-gray-400 text-sm">APPUYER SUR ESPACE POUR DÉMARRER</div>
                </div>
            </section>

            <div class="flex flex-col gap-4">
                <button data-tally-open="b5vlD7" 
                        class="bg-white text-black rounded-[1.25rem] p-6 text-left font-bold hover:bg-gray-200 transition">
                    Contactez-moi 👋
                </button>
                
                <div class="bg-[#1F1F1F] rounded-[1.25rem] p-6 border border-gray-800 text-center">
                    <p class="text-sm text-gray-400 mb-4">Retrouvez-moi sur :</p>
                    <div class="flex justify-center gap-6 text-xl">
                        <a href="https://www.youtube.com/@ayman-2.0tv" class="hover:text-red-500"><i class="fab fa-youtube"></i></a>
                        <a href="https://github.com/antoinengn45-boopIA" class="hover:text-white"><i class="fab fa-github"></i></a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Logique simplifiée du jeu Dino intégrée
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d'), W = 600, H = 150, GROUND = 118;
        let state = 'idle', dino = { x: 40, y: GROUND - 48 };

        function draw() {
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#1F1F1F'; ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#ffffff'; ctx.fillRect(0, GROUND, W, 2);
            ctx.fillRect(dino.x, dino.y, 40, 40); // Dino simplifié
            requestAnimationFrame(draw);
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { state = 'running'; dino.y -= 20; setTimeout(() => dino.y += 20, 300); }
        });
        draw();
    </script>
</body>
</html>
