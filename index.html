<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aywen.fr - Contact</title>
    <!-- Chargement de Tailwind CSS pour le design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body { background-color: #111; color: white; }
        .text-brand { color: #D2331B; }
        .pageContainer { background-color: #1a1a1a; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <div class="max-w-5xl mx-6 lg:mx-auto w-full">
        <header class="pt-7 pb-6 flex items-center justify-between">
            <h1 class="text-xl font-bold">Aywen</h1>
            <nav>
                <ul class="flex space-x-6 text-gray-300">
                    <li><a href="#" class="hover:text-white">Programmes</a></li>
                    <li><a href="#" class="hover:text-white text-brand">Contact</a></li>
                </ul>
            </nav>
        </header>

        <main class="flex-1 flex flex-col items-center text-center py-10">
            <h4 class="text-brand font-semibold uppercase">Une idée, une question ?</h4>
            <h2 class="text-4xl font-bold my-4">Contacte moi</h2>
            
            <!-- Conteneur pour le formulaire Tally -->
            <div id="tally-container" class="w-full max-w-2xl">
                <iframe data-tally-src="https://tally.so/embed/mZYRzB?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" 
                        width="100%" height="400" frameborder="0" title="Contact"></iframe>
            </div>
        </main>
    </div>

    <script>
        // Script pour charger Tally proprement
        (function() {
            var d = document, w = "https://tally.so/widgets/embed.js";
            var v = function () {
                if ("undefined" != typeof Tally) Tally.loadEmbeds();
                else d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach(function (e) {
                    e.src = e.dataset.tallySrc;
                });
            };
            if ("undefined" != typeof Tally) v();
            else if (d.querySelector('script[src="' + w + '"]') == null) {
                var s = d.createElement("script");
                s.src = w; s.onload = v; s.onerror = v;
                d.body.appendChild(s);
            }
        })();
    </script>
</body>
</html>
