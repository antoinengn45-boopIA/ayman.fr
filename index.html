<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antoine | Ayman.fr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script async src="https://tally.so/widgets/embed.js"></script>
    <style>
        body { background-color: #000; color: white; }
    </style>
</head>
<body class="min-h-screen font-sans">
    <div class="max-w-5xl mx-auto px-6 py-10">
        <header class="flex justify-between items-center mb-10">
            <div class="text-xl font-bold tracking-tighter">AYMAN.FR</div>
            <nav class="hidden md:flex gap-8 text-sm font-medium text-gray-400">
                <a href="#projets" class="hover:text-white transition">Projets</a>
                <a href="#" data-tally-open="b5vlD7" class="hover:text-white transition">Contact</a>
            </nav>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-4 gap-4">
            <section class="lg:col-span-3 bg-[#1F1F1F] rounded-[1.25rem] p-8 border border-gray-800">
                <h1 class="text-4xl font-bold mb-2">Antoine</h1>
                <p class="text-gray-400 mb-6">Développeur passionné par la tech et le développement web.</p>
                <h2 id="projets" class="text-lg font-bold mb-4 mt-8">À propos</h2>
                <p class="text-gray-300">Bienvenue sur mon espace personnel.</p>
            </section>

            <div class="flex flex-col gap-4">
                <button data-tally-open="b5vlD7" class="bg-white text-black rounded-[1.25rem] p-6 text-left font-bold hover:bg-gray-200 transition">
                    Contactez-moi 👋
                </button>
            </div>
        </main>
    </div>
</body>
</html>
