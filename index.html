<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayman.fr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script async src="https://tally.so/widgets/embed.js"></script>
    <style>
        body { background-color: #000; color: white; }
    </style>
</head>
<body class="min-h-screen font-sans">

    <div class="max-w-5xl mx-auto px-6 py-10">
        <header class="flex justify-between items-center mb-16">
            <div class="text-2xl font-bold">Ayman.fr</div>
            <nav class="flex gap-6 text-gray-400">
                <a href="#" class="hover:text-white transition">Programmes</a>
                <a href="#" class="hover:text-white transition">Contact</a>
            </nav>
        </header>

        <main>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 auto-rows-[12rem]">
                
                <div class="bg-[#1F1F1F] rounded-[1.25rem] p-6 row-span-2 flex flex-col justify-end">
                    <h2 class="text-2xl font-bold">Bienvenue</h2>
                    <p class="text-gray-400">Plateforme officielle</p>
                </div>

                <div class="bg-[#1F1F1F] rounded-[1.25rem] p-6"></div>
                <div class="bg-[#1F1F1F] rounded-[1.25rem] p-6"></div>
                <div class="bg-[#1F1F1F] rounded-[1.25rem] p-6"></div>
                <div class="bg-[#1F1F1F] rounded-[1.25rem] p-6"></div>

                <button data-tally-open="b5vlD7" 
                        data-tally-emoji-text="👋" 
                        data-tally-emoji-animation="wave" 
                        class="bg-white text-black font-bold rounded-[1.25rem] p-6 hover:bg-gray-200 transition text-left flex flex-col justify-between">
                    <span>Contactez-moi</span>
                    <span class="text-3xl">→</span>
                </button>

            </div>
        </main>

        <footer class="mt-20 text-gray-500 text-sm text-center italic">
            © 2026 Ayman.fr - Tous droits réservés.
        </footer>
    </div>

</body>
</html>
